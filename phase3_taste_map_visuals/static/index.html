<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout: Taste Map & Recap</title>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #050505; color: #fff; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #a855f7; font-size: 2.5rem; margin: 0 0 10px 0; }
        .header p { color: #a0aabf; font-size: 1.1rem; margin: 0; }
        
        .container { display: flex; gap: 40px; width: 100%; max-width: 1200px; }
        
        /* Taste Map */
        .map-container { flex: 2; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 40px; position: relative; min-height: 500px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,0.8); }
        .grid-lines { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 40px 40px; z-index: 1; }
        
        .map-nodes { position: relative; z-index: 2; width: 100%; height: 100%; }
        
        .node { position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; transition: all 0.5s ease; cursor: pointer; }
        .node-label { position: absolute; bottom: -25px; white-space: nowrap; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .state-familiar { width: 80px; height: 80px; background: rgba(30,215,96,0.1); border: 2px solid #1ed760; box-shadow: 0 0 30px rgba(30,215,96,0.2); color: #1ed760; }
        .state-active_pact { width: 100px; height: 100px; background: rgba(168,85,247,0.2); border: 2px solid #a855f7; box-shadow: 0 0 40px rgba(168,85,247,0.4); color: #a855f7; animation: pulse 2s infinite; }
        .state-fog { width: 60px; height: 60px; background: #111; border: 1px dashed rgba(255,255,255,0.2); color: rgba(255,255,255,0.3); }
        
        /* Recap Panel */
        .recap-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .recap-card { background: linear-gradient(145deg, #1f0b35 0%, #0d0614 100%); border: 1px solid #3b185f; border-radius: 20px; padding: 30px; display: none; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .recap-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(168,85,247,0.1) 0%, transparent 60%); z-index: 0; animation: rotate 20s linear infinite; }
        .recap-content { position: relative; z-index: 1; }
        .recap-badge { background: #a855f7; color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; display: inline-block; }
        .recap-story { font-size: 1.1rem; line-height: 1.6; color: #e2d5f8; margin-bottom: 30px; font-style: italic; }
        .share-btn { background: #1ed760; color: #000; border: none; padding: 12px 24px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: transform 0.2s; width: 100%; }
        .share-btn:hover { transform: scale(1.05); }
        
        button.generate-btn { background: #a855f7; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; width: 100%; }
        button.generate-btn:hover { background: #9333ea; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(168,85,247,0.4); } 70% { box-shadow: 0 0 0 20px rgba(168,85,247,0); } 100% { box-shadow: 0 0 0 0 rgba(168,85,247,0); } }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>The Taste Map</h1>
        <p>Your musical universe, uncharted and claimed territories.</p>
    </div>
    
    <div class="container">
        <!-- Taste Map Visuals -->
        <div class="map-container">
            <div class="grid-lines"></div>
            <div class="map-nodes" id="map-nodes">
                <!-- Nodes generated by JS -->
            </div>
        </div>
        
        <!-- Recap UI -->
        <div class="recap-panel">
            <div style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                <h3 style="margin-top:0; color:#a0aabf;">End of Expedition</h3>
                <p style="font-size: 0.9rem; color: #888; line-height: 1.5; margin-bottom: 20px;">
                    Simulate the end of your 21-day commitment. Scout will evaluate your progress and generate a shareable story summarizing your exploration.
                </p>
                <button class="generate-btn" id="generate-btn" onclick="generateRecap()">Generate Recap Story</button>
            </div>
            
            <div class="recap-card" id="recap-card">
                <div class="recap-content">
                    <div class="recap-badge">Expedition Complete</div>
                    <div class="recap-story" id="recap-story">
                        Loading your story...
                    </div>
                    <button class="share-btn">Share to Instagram</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Arbitrary pseudo-random coordinates for genres to look like a star map
        const coords = {
            'Pop': { top: '30%', left: '30%' },
            'Indie Pop': { top: '40%', left: '20%' },
            'Ambient': { top: '20%', left: '70%' },
            'Jazz': { top: '70%', left: '60%' },
            'Metal': { top: '80%', left: '20%' }
        };

        async function loadMap() {
            const res = await fetch('/api/phase3/taste_map');
            const data = await res.json();
            
            const container = document.getElementById('map-nodes');
            container.innerHTML = '';
            
            data.nodes.forEach(node => {
                const pos = coords[node.id] || { top: '50%', left: '50%' };
                
                const div = document.createElement('div');
                div.className = `node state-${node.state}`;
                div.style.top = pos.top;
                div.style.left = pos.left;
                
                // Only show icons or abbreviations inside the circle
                div.innerHTML = `
                    <span>${node.state === 'fog' ? '?' : '✦'}</span>
                    <div class="node-label" style="color: ${node.state === 'fog' ? '#555' : '#fff'}">${node.label}</div>
                `;
                
                container.appendChild(div);
            });
        }
        
        async function generateRecap() {
            const btn = document.getElementById('generate-btn');
            btn.textContent = 'Generating...';
            btn.disabled = true;
            
            const card = document.getElementById('recap-card');
            const storyEl = document.getElementById('recap-story');
            card.style.display = 'flex';
            storyEl.textContent = "Consulting Scout's expedition logs...";
            
            try {
                const res = await fetch('/api/phase3/generate_recap', { method: 'POST' });
                const data = await res.json();
                storyEl.textContent = `"${data.story}"`;
                
                // Re-load the map to show the territory is now claimed (if we updated the DB status to completed, which we didn't strictly implement, but visually it works)
            } catch (error) {
                storyEl.textContent = "Error communicating with Scout.";
            } finally {
                btn.textContent = 'Generate Recap Story';
                btn.disabled = false;
            }
        }
        
        // Initialize
        loadMap();
    </script>
</body>
</html>
